<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tres en Línea</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- ===== AUTH ===== -->
<div class="screen active" id="screenAuth">
    <div class="auth-card">
        <div class="auth-title">🎮 TRES EN LÍNEA</div>
        <div class="auth-sub">Inicia sesión o regístrate para jugar</div>
        <div class="tabs">
            <button class="tab-btn tab-active" id="tabLogin">Iniciar sesión</button>
            <button class="tab-btn" id="tabRegistro">Registrarse</button>
        </div>

        <!-- Login -->
        <form id="formLogin">
            <div class="form-group">
                <label>Correo</label>
                <input type="email" id="loginEmail" placeholder="tu@correo.com" required>
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="loginPassword" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-primary">Entrar</button>
        </form>

        <!-- Registro -->
        <form id="formRegistro" style="display:none">
            <div class="form-group">
                <label>Nombre de usuario</label>
                <input type="text" id="regUsername" placeholder="jugador123" required>
            </div>
            <div class="form-group">
                <label>Correo</label>
                <input type="email" id="regEmail" placeholder="tu@correo.com" required>
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="regPassword" placeholder="mínimo 6 caracteres" required minlength="6">
            </div>
            <div class="form-group">
                <label>Elige tu avatar</label>
                <div class="avatar-grid" id="avatarGrid"></div>
                <label class="avatar-upload-label">
                    📷 Subir foto
                    <input type="file" id="inputAvatarUpload" accept="image/*" style="display:none">
                </label>
                <img id="avatarPreview" alt="preview">
                <input type="hidden" id="avatarSeleccionado">
                <input type="hidden" id="avatarTipo">
            </div>
            <button type="submit" class="btn-primary">Crear cuenta</button>
        </form>

        <div class="auth-error" id="authError"></div>
    </div>
</div>

<!-- ===== OTP ===== -->
<div class="screen" id="screenOtp">
    <div class="otp-card">
        <div class="otp-title">📧 Confirma tu correo</div>
        <div class="otp-desc">Ingresa el código que enviamos a<br><strong id="otpEmailLabel"></strong></div>
        <form id="formOtp">
            <input type="text" id="otpInput" maxlength="6" placeholder="000000" inputmode="numeric">
            <button type="submit" class="btn-primary">Verificar</button>
        </form>
        <button class="btn-secondary" id="btnReenviarOtp">Reenviar código</button>
        <div class="auth-error" id="otpError"></div>
    </div>
</div>

<!-- ===== LOBBY ===== -->
<div class="screen" id="screenLobby">
    <div class="top-bar">
        <div class="header-usuario" id="headerUsuario"></div>
        <div class="top-bar-btns">
            <button class="btn-icon" id="btnRanking">🏆 Ranking</button>
            <button class="btn-icon" id="btnSalir">Salir</button>
        </div>
    </div>
    <div class="lobby-title">Salas</div>
    <div class="lobby-sub">Elige una sala disponible para jugar</div>
    <div class="salas-grid" id="salasGrid"></div>
</div>

<!-- ===== JUEGO ===== -->
<div class="screen" id="screenJuego">
    <div class="container">
        <div class="game-header">
            <button class="btn-volver" id="btnVolver">← Lobby</button>
            <h1>TRES EN LÍNEA</h1>
            <div class="sala-id-label" id="salaLabel">Sala 1</div>
        </div>
        <div class="marcador">
            <div class="marcador-item">
                <div class="marcador-label">X gana</div>
                <div class="marcador-valor x" id="puntosX">0</div>
            </div>
            <div class="marcador-sep">|</div>
            <div class="marcador-item">
                <div class="marcador-label">Empates</div>
                <div class="marcador-valor empate" id="puntosEmpate">0</div>
            </div>
            <div class="marcador-sep">|</div>
            <div class="marcador-item">
                <div class="marcador-label">O gana</div>
                <div class="marcador-valor o" id="puntosO">0</div>
            </div>
        </div>
        <div class="estado" id="estado">Conectando...</div>
        <div class="reinicio-auto" id="reinicioAuto"></div>
        <div class="tablero" id="tablero"></div>
        <button id="reiniciar">Reiniciar partida</button>
        <div class="footer">Tiempo real con Supabase</div>
        <div class="logs-area" id="logsPanel"><div class="log-entry">Iniciando...</div></div>
    </div>
</div>

<!-- ===== RANKING ===== -->
<div class="screen" id="screenRanking">
    <div class="top-bar">
        <button class="btn-icon" id="btnVolverLobby">← Lobby</button>
        <div class="ranking-title">🏆 Ranking Global</div>
        <div style="width:70px"></div>
    </div>
    <div class="ranking-card">
        <table class="ranking-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Jugador</th>
                    <th>✅ V</th>
                    <th>🤝 E</th>
                    <th>❌ D</th>
                </tr>
            </thead>
            <tbody id="rankingTabla"></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initAuth, initAuthUI, cerrarSesion, actualizarHeaderUsuario } from './js/auth.js';
    import { mostrarPantalla } from './js/router.js';
    import { cargarLobby } from './js/lobby.js';
    import { initGame } from './js/game.js';
    import { cargarRanking } from './js/ranking.js';

    // Inicializar UI de auth
    initAuthUI();
    initGame();

    // Botones globales
    document.getElementById('btnSalir').addEventListener('click', cerrarSesion);
    document.getElementById('btnRanking').addEventListener('click', cargarRanking);
    document.getElementById('btnVolverLobby').addEventListener('click', () => {
        mostrarPantalla('screenLobby');
        cargarLobby();
    });

    // Verificar sesión activa al cargar
    const sesionActiva = await initAuth();
    if (sesionActiva) {
        mostrarPantalla('screenLobby');
        cargarLobby();
        actualizarHeaderUsuario();
    }
</script>
</body>
</html>
