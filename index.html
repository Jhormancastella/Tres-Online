<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tres Online</title>
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/dipv76dpn/image/upload/v1776561739/b_quiero_crear_un_logo-Photoroom_br2ybi.png">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<script type="module">
    import { montarUI }                                                    from './js/ui.js';
    import { initAuth, initAuthUI, cerrarSesion,
             actualizarHeaderUsuario, setOnAvatarClick }                   from './js/auth.js';
    import { mostrarPantalla }                                             from './js/router.js';
    import { cargarLobby, limpiarLobby, resetearTodasLasSalas }           from './js/lobby.js';
    import { initGame }                                                    from './js/game.js';
    import { cargarRanking }                                               from './js/ranking.js';
    import { initPerfil, abrirPerfil }                                     from './js/perfil.js';

    // 1. Montar todo el HTML de pantallas
    montarUI();

    // 2. Inicializar módulos
    initAuthUI();
    initGame();
    initPerfil();
    setOnAvatarClick(abrirPerfil);

    // 3. Eventos globales
    document.getElementById('btnSalir').addEventListener('click', async () => {
        try {
            limpiarLobby();
            await cerrarSesion();
        } catch (e) {
            console.error('Error al salir:', e);
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screenAuth').classList.add('active');
        }
    });

    document.getElementById('btnRanking').addEventListener('click', cargarRanking);

    document.getElementById('btnVolverLobby').addEventListener('click', () => {
        mostrarPantalla('screenLobby');
        cargarLobby();
    });

    document.getElementById('btnResetSalas').addEventListener('click', async () => {
        const btn = document.getElementById('btnResetSalas');
        btn.disabled = true;
        btn.textContent = '⏳ Limpiando...';
        await resetearTodasLasSalas();
        await cargarLobby();
        btn.disabled = false;
        btn.textContent = '🔄 Limpiar salas';
    });

    // 4. Verificar sesión activa
    const sesionActiva = await initAuth();
    if (sesionActiva) {
        mostrarPantalla('screenLobby');
        cargarLobby();
        actualizarHeaderUsuario();
    }
</script>
</body>
</html>
