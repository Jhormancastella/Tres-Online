<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tres Online</title>
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/dipv76dpn/image/upload/v1776627650/a_agregemos_el_X_l_O_d_r0nubi.png">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- ===== INTRO VIDEO ===== -->
<div id="introOverlay">
    <video id="introVideo" src="https://res.cloudinary.com/dipv76dpn/video/upload/v1776640929/VID_20260415_084919_181_bsl_2_wawtkk.mp4"
        autoplay muted playsinline webkit-playsinline>
    </video>
    <button id="introSkip">Saltar ▶</button>
</div>
<script type="module">
    import { montarUI }                                                    from './js/ui.js';
    import { initAuth, initAuthUI, cerrarSesion,
             actualizarHeaderUsuario, setOnAvatarClick }                   from './js/auth.js';
    import { mostrarPantalla }                                             from './js/router.js';
    import { cargarLobby, limpiarLobby, resetearTodasLasSalas }           from './js/lobby.js';
    import { initGame }                                                    from './js/game.js';
    import { cargarRanking }                                               from './js/ranking.js';
    import { initPerfil, abrirPerfil }                                     from './js/perfil.js';

    function cerrarIntro() {
        const overlay = document.getElementById('introOverlay');
        overlay.classList.add('intro-saliendo');
        setTimeout(() => overlay.remove(), 600);
    }

    const video = document.getElementById('introVideo');
    const skip  = document.getElementById('introSkip');

    video.addEventListener('ended', cerrarIntro);
    skip.addEventListener('click', cerrarIntro);
    // También cerrar si el video no carga
    video.addEventListener('error', cerrarIntro);

    // 1. Montar todo el HTML de pantallas
    montarUI();

    // 2. Inicializar módulos
    initAuthUI();
    initGame();
    initPerfil();
    setOnAvatarClick(abrirPerfil);

    // 3. Eventos globales
    document.getElementById('btnSalir').addEventListener('click', async () => {
        try {
            limpiarLobby();
            await cerrarSesion();
        } catch (e) {
            console.error('Error al salir:', e);
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screenAuth').classList.add('active');
        }
    });

    document.getElementById('btnRanking').addEventListener('click', cargarRanking);

    document.getElementById('btnVolverLobby').addEventListener('click', () => {
        mostrarPantalla('screenLobby');
        cargarLobby();
    });

    document.getElementById('btnResetSalas').addEventListener('click', async () => {
        const btn = document.getElementById('btnResetSalas');
        btn.disabled = true;
        btn.textContent = '⏳ Limpiando...';
        await resetearTodasLasSalas();
        await cargarLobby();
        btn.disabled = false;
        btn.textContent = '🔄 Limpiar salas';
    });

    // 4. Verificar sesión activa
    const sesionActiva = await initAuth();
    if (sesionActiva) {
        mostrarPantalla('screenLobby');
        cargarLobby();
        actualizarHeaderUsuario();
    }
</script>
</body>
</html>
