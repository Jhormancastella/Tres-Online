<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tres en Línea - Multijugador 1v1</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            font-family: system-ui, 'Segoe UI', monospace;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            min-height: 100vh;
            margin: 0;
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 1.2rem;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 {
            color: #facc15;
            text-align: center;
            margin-top: 0;
            font-size: 1.8rem;
        }
        .tablero {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            background: #2d3a4a;
            padding: 16px;
            border-radius: 1.5rem;
            margin: 10px 0;
        }
        .celda {
            background: #0f172a;
            border-radius: 1rem;
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: bold;
            color: #facc15;
            cursor: pointer;
            transition: 0.1s ease;
            box-shadow: 0 5px 0 #00000033;
        }
        .celda:active {
            transform: scale(0.96);
        }
        .estado {
            text-align: center;
            margin: 15px 0 10px;
            font-size: 1.2rem;
            font-weight: bold;
            background: #00000066;
            padding: 8px;
            border-radius: 60px;
            color: #facc15;
        }
        button {
            background: #facc15;
            border: none;
            font-weight: bold;
            font-size: 1rem;
            padding: 10px;
            border-radius: 40px;
            cursor: pointer;
            width: 100%;
            transition: 0.1s;
            color: #0f172a;
            margin: 8px 0;
        }
        button:active {
            transform: scale(0.97);
        }
        .logs-area {
            background: #0a0f1a;
            color: #a5f3c3;
            font-family: monospace;
            font-size: 0.7rem;
            padding: 8px;
            border-radius: 16px;
            margin-top: 16px;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #facc1533;
        }
        .log-entry {
            border-bottom: 1px solid #334155;
            padding: 4px 4px;
            word-break: break-word;
        }
        .log-error {
            color: #ffa6a6;
            background: #7f1a1a33;
        }
        .log-success {
            color: #b9ffb9;
        }
        .footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 12px;
            color: #94a3b8;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>⚡ TRES EN LÍNEA 1vs1</h1>
    <div class="estado" id="estado">🔄 Conectando...</div>
    <div class="tablero" id="tablero"></div>
    <button id="reiniciar">🔄 Reiniciar partida</button>
    <div class="footer">🎮 Solo dos jugadores - Tiempo real con Supabase</div>
    
    <div class="logs-area" id="logsPanel">
        <div class="log-entry">📡 Iniciando juego...</div>
    </div>
</div>

<script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    // Credenciales (modo pruebas)
    const supabaseUrl = 'https://vkylxedxgcxrxfezmaau.supabase.co';
    const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZreWx4ZWR4Z2N4cnhmZXptYWF1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1Mjg1NTcsImV4cCI6MjA5MjEwNDU1N30.QLAB88lwIAwc0IZ2bOwF8cw3QBkcidW9zac7LCvaMiw';
    
    const supabase = createClient(supabaseUrl, supabaseAnonKey);
    const GAME_ID = 1;

    // Estado
    let miSimbolo = null;
    let turnoActual = 'X';
    let juegoTerminado = false;
    let tableroLocal = ["", "", "", "", "", "", "", "", ""];
    
    // DOM
    const tableroDiv = document.getElementById("tablero");
    const estadoSpan = document.getElementById("estado");
    const botonReiniciar = document.getElementById("reiniciar");
    const logsPanel = document.getElementById("logsPanel");

    // Logs
    function addLog(mensaje, tipo = "info") {
        const logDiv = document.createElement("div");
        logDiv.classList.add("log-entry");
        if (tipo === "error") logDiv.classList.add("log-error");
        if (tipo === "success") logDiv.classList.add("log-success");
        const timestamp = new Date().toLocaleTimeString();
        logDiv.textContent = `[${timestamp}] ${mensaje}`;
        logsPanel.appendChild(logDiv);
        logsPanel.scrollTop = logsPanel.scrollHeight;
        console.log(mensaje);
    }

    // Crear tablero visual
    function crearTableroVisual() {
        tableroDiv.innerHTML = "";
        for (let i = 0; i < 9; i++) {
            const celda = document.createElement("div");
            celda.classList.add("celda");
            celda.dataset.index = i;
            celda.textContent = ""; // inicial vacío
            celda.addEventListener("click", () => hacerMovimiento(i));
            tableroDiv.appendChild(celda);
        }
        addLog("✅ Tablero visual creado", "success");
    }

    function actualizarVista() {
        const celdas = document.querySelectorAll(".celda");
        if (celdas.length !== 9) {
            addLog("⚠️ Error: no se encontraron las celdas", "error");
            return;
        }
        for (let i = 0; i < 9; i++) {
            celdas[i].textContent = tableroLocal[i];
        }
        addLog(`🖌️ Vista actualizada: ${tableroLocal.join('')}`, "info");
    }

    // Verificar ganador
    function verificarGanador(board) {
        const lineas = [
            [0,1,2], [3,4,5], [6,7,8],
            [0,3,6], [1,4,7], [2,5,8],
            [0,4,8], [2,4,6]
        ];
        for (let linea of lineas) {
            const [a,b,c] = linea;
            if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                return board[a];
            }
        }
        if (board.every(cell => cell !== "")) return "empate";
        return null;
    }

    // Enviar movimiento
    async function hacerMovimiento(indice) {
        if (juegoTerminado) {
            addLog("⛔ Partida terminada. Reinicia.", "error");
            return;
        }
        if (miSimbolo !== turnoActual) {
            addLog(`🙅 No es tu turno (tú: ${miSimbolo}, turno: ${turnoActual})`, "error");
            return;
        }
        if (tableroLocal[indice] !== "") {
            addLog("❌ Casilla ocupada", "error");
            return;
        }

        const nuevoTablero = [...tableroLocal];
        nuevoTablero[indice] = miSimbolo;
        const ganador = verificarGanador(nuevoTablero);
        let siguienteTurno = (turnoActual === 'X') ? 'O' : 'X';
        let activo = true;
        if (ganador) {
            siguienteTurno = null;
            activo = false;
            addLog(`🏆 ${ganador} ha ganado!`, "success");
        }

        addLog(`📤 Enviando ${miSimbolo} en casilla ${indice}`, "info");
        
        const { error } = await supabase
            .from('games')
            .update({
                board: nuevoTablero,
                current_turn: siguienteTurno,
                winner: ganador,
                is_active: activo
            })
            .eq('id', GAME_ID);

        if (error) {
            addLog(`❌ Error al guardar: ${error.message}`, "error");
            estadoSpan.textContent = "Error de red";
        } else {
            addLog(`✅ Movimiento guardado`, "success");
        }
    }

    // Reiniciar partida
    async function reiniciarPartida() {
        addLog("♻️ Reiniciando...", "info");
        const tableroVacio = ["", "", "", "", "", "", "", "", ""];
        const { error } = await supabase
            .from('games')
            .update({
                board: tableroVacio,
                current_turn: 'X',
                winner: null,
                is_active: true,
                x_player_id: null,
                o_player_id: null
            })
            .eq('id', GAME_ID);
        if (error) {
            addLog(`Error al reiniciar: ${error.message}`, "error");
        } else {
            addLog(`♻️ Reinicio enviado`, "success");
        }
    }

    // Asignar símbolo (X u O) con control de 2 jugadores máximo
    async function asignarSimbolo() {
        addLog("🔍 Asignando símbolo...", "info");
        
        // Obtener estado actual de la partida (incluyendo x_player_id y o_player_id)
        let { data: game, error } = await supabase
            .from('games')
            .select('x_player_id, o_player_id')
            .eq('id', GAME_ID)
            .single();
        
        if (error) {
            addLog(`⚠️ Error al leer asignaciones: ${error.message}`, "error");
            return;
        }
        
        const sessionId = Math.random().toString(36).substring(2, 10);
        
        if (!game.x_player_id) {
            // Tomar X
            const { error: updateErr } = await supabase
                .from('games')
                .update({ x_player_id: sessionId })
                .eq('id', GAME_ID);
            if (updateErr) {
                addLog(`Error al tomar X: ${updateErr.message}`, "error");
            } else {
                miSimbolo = 'X';
                addLog(`🎮 Eres X`, "success");
                estadoSpan.textContent = "Eres X. Esperando oponente...";
            }
        } 
        else if (!game.o_player_id) {
            // Tomar O
            const { error: updateErr } = await supabase
                .from('games')
                .update({ o_player_id: sessionId })
                .eq('id', GAME_ID);
            if (updateErr) {
                addLog(`Error al tomar O: ${updateErr.message}`, "error");
            } else {
                miSimbolo = 'O';
                addLog(`🎮 Eres O`, "success");
                estadoSpan.textContent = "Eres O. ¡Juega!";
            }
        } 
        else {
            miSimbolo = null;
            addLog(`👀 Partida llena. Eres espectador.`, "error");
            estadoSpan.textContent = "Partida llena (2 jugadores)";
        }
    }

    // Inicializar sincronización
    async function iniciarSincronizacion() {
        addLog("🚀 Inicializando...", "info");
        
        // Asegurar que la partida existe (insertar si no)
        const { error: upsertError } = await supabase
            .from('games')
            .upsert({
                id: GAME_ID,
                board: ["","","","","","","","",""],
                current_turn: 'X',
                winner: null,
                is_active: true,
                x_player_id: null,
                o_player_id: null
            }, { onConflict: 'id' });
        
        if (upsertError) {
            addLog(`⚠️ Upsert falló: ${upsertError.message}. Asegúrate de haber insertado la fila con SQL.`, "error");
        } else {
            addLog(`📦 Partida asegurada (ID ${GAME_ID})`, "success");
        }
        
        // Asignar símbolo
        await asignarSimbolo();
        
        // Cargar estado actual
        const { data: currentGame, error: loadError } = await supabase
            .from('games')
            .select('*')
            .eq('id', GAME_ID)
            .single();
        
        if (loadError) {
            addLog(`❌ Error al cargar partida: ${loadError.message}`, "error");
        } else if (currentGame) {
            tableroLocal = currentGame.board;
            turnoActual = currentGame.current_turn;
            juegoTerminado = !currentGame.is_active;
            actualizarVista();
            addLog(`📥 Estado cargado. Turno: ${turnoActual}`, "success");
            if (currentGame.winner) addLog(`Ganador: ${currentGame.winner}`, "info");
        }
        
        // Escuchar cambios en tiempo real
        supabase
            .channel('game-realtime')
            .on('postgres_changes', {
                event: 'UPDATE',
                schema: 'public',
                table: 'games',
                filter: `id=eq.${GAME_ID}`
            }, (payload) => {
                addLog(`📡 Cambio detectado`, "success");
                const newState = payload.new;
                tableroLocal = newState.board;
                turnoActual = newState.current_turn;
                juegoTerminado = !newState.is_active;
                actualizarVista();
                
                if (newState.winner === 'empate') {
                    estadoSpan.textContent = "🤝 ¡Empate!";
                } else if (newState.winner) {
                    estadoSpan.textContent = `🏆 Ganó ${newState.winner}`;
                } else {
                    if (miSimbolo === turnoActual && miSimbolo !== null) {
                        estadoSpan.textContent = "🎯 Tu turno";
                    } else if (miSimbolo !== null) {
                        estadoSpan.textContent = `Turno de ${turnoActual}`;
                    } else {
                        estadoSpan.textContent = "Espectador";
                    }
                }
            })
            .subscribe((status) => {
                addLog(`🔌 Realtime: ${status}`, status === 'SUBSCRIBED' ? "success" : "info");
            });
    }

    // Inicio
    crearTableroVisual();
    iniciarSincronizacion().catch(err => addLog(`💥 Error fatal: ${err.message}`, "error"));
    botonReiniciar.addEventListener("click", reiniciarPartida);
</script>
</body>
</html>
